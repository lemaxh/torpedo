<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>3D Torpedó - Parancsnoki Központ</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #111; color: #0f0; font-family: monospace; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        #ui-layer { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(0, 5, 0, 0.85); 
            padding: 25px; 
            border: 1px solid #0f0; 
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.15);
            max-height: 90vh; 
            overflow-y: auto; 
            width: 380px; 
        }
        
        h2 { margin-top: 0; color: #0f0; text-align: center; border-bottom: 1px solid #0f0; padding-bottom: 10px; font-size: 22px; }
        h3 { text-align: center; margin-bottom: 15px; }

        button, input { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            margin: 6px 0; 
            background: #111; 
            color: #0f0; 
            border: 1px solid #0f0; 
            border-radius: 4px;
            font-family: monospace; 
            transition: all 0.3s ease;
        }
        
        button:hover:not(:disabled) { 
            background: #0f0; 
            color: #000; 
            cursor: pointer; 
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        button:disabled { 
            background: #0a0a0a; 
            color: #333; 
            border-color: #333; 
            cursor: not-allowed; 
        }

        input { background: #000; }
        input:focus { outline: none; box-shadow: 0 0 10px rgba(0, 255, 0, 0.8); border-color: #fff; color: #fff; }
        
        #roomCodeInput { 
            text-align: center; 
            font-size: 20px; 
            letter-spacing: 5px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-top: 15px;
        }

        .divider { text-align: center; color: #555; margin: 10px 0; font-size: 14px; }

        #radar-log { 
            margin-top: 25px; 
            border-top: 1px dashed #0f0; 
            padding-top: 15px; 
            height: 160px; 
            overflow-y: auto; 
            font-size: 13px;
            line-height: 1.4;
        }
        .enemy { color: #f55; }
        .system { color: #aaa; }
        
        #planning-area, #game-area { display: none; margin-top: 20px; border-top: 1px dashed #0f0; padding-top: 20px; }
        .instruction { color: #0ff; font-size: 0.9em; margin-bottom: 15px; text-align: center; background: rgba(0, 255, 255, 0.1); padding: 10px; border-radius: 4px;}
        
        .view-btn { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h2>🚀 Torpedó Központ</h2>
        
        <div id="lobby-area">
            <button id="createRoomBtn">Új szoba létrehozása (Host)</button>
            <div class="divider">VAGY</div>
            <input type="text" id="roomCodeInput" placeholder="KÓD" maxlength="5">
            <button id="joinRoomBtn">Csatlakozás a szobához</button>
            <h3 id="status-display" style="color: yellow; margin-top: 15px; font-size: 16px;"></h3>
        </div>

        <div id="planning-area">
            <h3 style="color: #0ff;">🛠️ Flotta elhelyezése</h3>
            <div class="instruction">
                Egér mozgás: Célzás a rácson<br>
                Bal klikk: Hajó lerakása<br>
                'R' gomb: Forgatás 90°-kal<br>
                <b>Jobb klikk: Kamera forgatása</b>
            </div>
            <p style="text-align: center; font-size: 18px;">Lerakott hajók: <span id="ship-count" style="color: #0ff; font-weight: bold;">0</span> / 5</p>
            <button id="readyBtn" disabled>Kész vagyok a pakolással!</button>
        </div>

        <div id="game-area">
            <h3 style="color: #f55;">🔥 Harckészültség!</h3>
            <div id="view-controls">
                <button id="viewDefensiveBtn" class="view-btn" style="border-color: #0f0; color: #0f0;">🛡️ Saját Flotta Nézete</button>
                <button id="viewOffensiveBtn" class="view-btn" style="border-color: #f55; color: #f55;">⚔️ Támadó Nézet (Köd)</button>
                <button id="viewRadarBtn" class="view-btn" style="border-color: #00f; color: #55f;" disabled>📡 Radar (Fejlesztés alatt)</button>
            </div>
            <div class="instruction" style="color: #f55; background: rgba(255, 0, 0, 0.1);">
                Válts Támadó nézetbe a lövéshez!<br>
                Kattints a bal gombbal a ködben!
            </div>
        </div>

        <div id="radar-log"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r145/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/objects/Water.js"></script>
    <script src="main.js"></script>
</body>
</html>
