<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>3D Torpedó</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #0f0; font-family: monospace; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #ui-layer { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); padding: 20px; border: 1px solid #0f0; max-height: 90vh; overflow-y: auto; width: 350px; }
        button, input { padding: 10px; font-size: 16px; margin: 5px 0; background: #222; color: #0f0; border: 1px solid #0f0; font-family: monospace; width: 100%; }
        button:hover { background: #333; cursor: pointer; }
        button:disabled { background: #111; color: #555; border-color: #555; cursor: not-allowed; }
        #radar-log { margin-top: 20px; border-top: 1px dashed #0f0; padding-top: 10px; height: 150px; overflow-y: auto; }
        .enemy { color: #f55; }
        .system { color: #aaa; }
        
        /* Új elemek a tervezési fázishoz */
        #planning-area { display: none; margin-top: 20px; border-top: 1px dashed #0f0; padding-top: 20px; }
        .instruction { color: #0ff; font-size: 0.9em; margin-bottom: 15px; }
        #game-area { display: none; margin-top: 20px; border-top: 1px dashed #0f0; padding-top: 20px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h2>🚀 Torpedó Parancsnokság</h2>
        
        <div id="lobby-area">
            <button id="createRoomBtn">Új szoba létrehozása (Host)</button>
            <input type="text" id="roomCodeInput" placeholder="Ide írd a kódot..." maxlength="5" style="text-align: center;">
            <button id="joinRoomBtn">Csatlakozás</button>
            <h3 id="status-display" style="color: yellow; text-align: center;"></h3>
        </div>

        <div id="planning-area">
            <h3 style="color: #0ff;">🛠️ Flotta elhelyezése</h3>
            <div class="instruction">
                Egér: Mozgatás a rácson<br>
                Bal klikk: Hajó lerakása<br>
                'R' gomb: Forgatás (Ferdén is!)
            </div>
            <p>Lerakott hajók: <span id="ship-count">0</span> / 5</p>
            <button id="readyBtn" disabled>Kész vagyok a pakolással!</button>
        </div>

      <div id="game-area">
            <h3 style="color: #f55;">🔥 Harckészültség!</h3>
            
            <div id="view-controls" style="margin-bottom: 15px;">
                <button id="viewDefensiveBtn" style="background: #005500;">🛡️ Saját Flotta Nézet</button>
                <button id="viewOffensiveBtn" style="background: #550000;">⚔️ Támadás (Fehér Köd)</button>
                <button id="viewRadarBtn" style="background: #000055;" disabled>📡 Radar (Hamarosan)</button>
            </div>

            <div class="instruction" style="color: #f55;">
                Válts Támadó nézetbe a lövéshez!<br>
                Kattints a bal gombbal a ködben!
            </div>
        </div>
        <div id="radar-log"></div>
    </div>

   <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script src="main.js"></script>
</body>
</html>
