<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Hitbox Illesztő & Lőtér</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #fff; font-family: sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #controls { position: absolute; top: 10px; right: 10px; width: 400px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 8px; border: 1px solid #0f0; max-height: 95vh; overflow-y: auto; }
        h3 { margin-top: 0; color: #0f0; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; color: #ddd; }
        input[type=range] { width: 100%; margin-top: 5px; }
        select, button { width: 100%; padding: 8px; margin-top: 5px; background: #222; color: #0f0; border: 1px solid #0f0; font-family: monospace; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
        .val { color: #0ff; float: right; }
        #code-output { background: #000; padding: 10px; border: 1px dashed #0f0; color: #0f0; font-family: monospace; white-space: pre-wrap; margin-top: 15px; font-size: 11px; }
        .help { font-size: 12px; color: #aaa; margin: 10px 0; background: #222; padding: 10px; border-left: 3px solid #0ff; }
        .action-row { display: flex; gap: 10px; margin-top: 15px; }
        
        .territory-badge { display: inline-block; padding: 3px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; margin-right: 5px; }
        .bg-blue { background: rgba(0, 136, 255, 0.3); border: 1px solid #08f; }
        .bg-red { background: rgba(255, 0, 0, 0.3); border: 1px solid #f00; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="controls">
        <h3>🎯 Hitbox Lőtér & Illesztő</h3>
        
        <div class="help">
            <b>1. ILLESZTÉS:</b> Told a szürke modellt a zöld 1x1-es rácskockákba!<br>
            <b>2. TESZT:</b> Kattints a rácsra a lövéshez!<br>
            <span class="territory-badge bg-blue">KÉK TÉRFÉL</span> = Saját oldal (Z > 0)<br>
            <span class="territory-badge bg-red">SZÜRKE KÖD</span> = Ellenség (Z < 0)<br>
            <i>Kamera: Egér jobb gomb (Forgatás), Görgő (Zoom).</i>
        </div>

        <div class="action-row">
            <button id="rotateBtn">🔄 Forgatás 90° (Mint az 'R' gomb)</button>
            <button id="clearShotsBtn">🗑️ Lövések törlése</button>
        </div>

        <label>Melyik hajót kalibráljuk?</label>
        <select id="shipSelect">
            <option value="0">2helyes.glb (Hossz: 2)</option>
            <option value="1">3helyes1.glb (Hossz: 3)</option>
            <option value="2">3helyes2.glb (Hossz: 3)</option>
            <option value="3">4helyes.glb (Hossz: 4)</option>
            <option value="4">5helyes.glb (Hossz: 5)</option>
        </select>

        <label>Méret (Scale): <span id="scaleVal" class="val">0.10</span></label>
        <input type="range" id="scale" min="0.01" max="0.5" step="0.01" value="0.10">

        <label>X Forgatás (Bólintás): <span id="rotXVal" class="val">90°</span></label>
        <input type="range" id="rotX" min="-180" max="180" step="5" value="90">

        <label>Y Forgatás (Irányék): <span id="rotYVal" class="val">0°</span></label>
        <input type="range" id="rotY" min="-180" max="180" step="5" value="0">

        <label>Z Forgatás (Dőlés): <span id="rotZVal" class="val">0°</span></label>
        <input type="range" id="rotZ" min="-180" max="180" step="5" value="0">

        <label>X Eltolás (Piros tengely): <span id="posXVal" class="val">0.0</span></label>
        <input type="range" id="posX" min="-10" max="10" step="0.05" value="0">

        <label>Y Eltolás (Magasság): <span id="posYVal" class="val">0.0</span></label>
        <input type="range" id="posY" min="-10" max="10" step="0.05" value="0">

        <label>Z Eltolás (Kék tengely - Hossz): <span id="posZVal" class="val">0.0</span></label>
        <input type="range" id="posZ" min="-10" max="10" step="0.05" value="0">

        <label>A Végleges main.js kódod:</label>
        <div id="code-output"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        const canvasContainer = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // --- 1. KAMERA BEÁLLÍTÁSOK ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 10, 14); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x111111);
        canvasContainer.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
        
        // KAMERA KORLÁTOZÁSOK (Zoom limit és talaj alá bukás gátlása)
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Nem tudsz a pálya alá nézni
        controls.minDistance = 12.0; // 3/4 ZOOM LIMIT: Nem enged ráközelíteni annyira, hogy kivágja a modellt
        controls.maxDistance = 35.0; // Max távolság

        // --- 2. FIZIKAI KÖD TÉGLALAP (Csak az ellenség térfelén) ---
        // 20 széles, 8 magas, 10 mély doboz
        const fogBoxGeo = new THREE.BoxGeometry(20, 8, 10);
        const fogBoxMat = new THREE.MeshBasicMaterial({ 
            color: 0x999999, 
            transparent: true, 
            opacity: 0.85, 
            depthWrite: false 
        });
        const fogBox = new THREE.Mesh(fogBoxGeo, fogBoxMat);
        fogBox.position.set(0, 4, -5); // Pálya közepe felett, Z negatív irányba eltolva
        scene.add(fogBox);

        // --- 3. TÉRKÉP, HATÁROK ÉS TÉRFELEK ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(3); 
        scene.add(axesHelper);

        // Zöld határvonal a középvonalon (Z = 0)
        const borderGeo = new THREE.BoxGeometry(20, 0.05, 0.05);
        const borderMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const borderLine = new THREE.Mesh(borderGeo, borderMat);
        borderLine.position.set(0, 0.01, 0);
        scene.add(borderLine);

        // Vizuális zónajelölők a rács alá
        // Ellenség térfele (Köd felé, pirosas)
        const enemyPlaneGeo = new THREE.PlaneGeometry(20, 10);
        const enemyPlaneMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.05, side: THREE.DoubleSide });
        const enemyPlane = new THREE.Mesh(enemyPlaneGeo, enemyPlaneMat);
        enemyPlane.rotation.x = -Math.PI / 2;
        enemyPlane.position.set(0, -0.01, -5); 
        scene.add(enemyPlane);

        // Saját térfél (Kamera felől, kékes)
        const ownPlaneGeo = new THREE.PlaneGeometry(20, 10);
        const ownPlaneMat = new THREE.MeshBasicMaterial({ color: 0x0088ff, transparent: true, opacity: 0.05, side: THREE.DoubleSide });
        const ownPlane = new THREE.Mesh(ownPlaneGeo, ownPlaneMat);
        ownPlane.rotation.x = -Math.PI / 2;
        ownPlane.position.set(0, -0.01, 5); 
        scene.add(ownPlane);

        // Fények
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Lövésekhez Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); 
        const planeIntersect = new THREE.Vector3();
        let shotMarkers = [];

        const hitboxMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.8 });
        let mainWrapper = new THREE.Group(); 
        scene.add(mainWrapper);
        
        let currentHitbox = null;
        let gameRotationY = 0; 

        const configs = [
            { file: '2helyes.glb', length: 2, scale: 0.10, rotX: 90, rotY: 0, rotZ: 90, posX: -3.95, posY: 1.20, posZ: -0.40 },
            { file: '3helyes1.glb', length: 3, scale: 0.10, rotX: 90, rotY: 0, rotZ: 90, posX: -2.15, posY: 1.20, posZ: -0.20 },
            { file: '3helyes2.glb', length: 3, scale: 0.10, rotX: 90, rotY: 0, rotZ: 90, posX: 3.95, posY: 1.20, posZ: -0.20 },
            { file: '4helyes.glb', length: 4, scale: 0.10, rotX: 90, rotY: 0, rotZ: 90, posX: 2.35, posY: 1.20, posZ: 0.00 },
            { file: '5helyes.glb', length: 5, scale: 0.10, rotX: 0, rotY: 90, rotZ: 0, posX: -0.25, posY: 1.20, posZ: 0.10 }
        ];
        
        const loader = new THREE.GLTFLoader();
        let loadedModels = [];
        let currentModelMesh = null;

        const selectEl = document.getElementById('shipSelect');
        const scaleEl = document.getElementById('scale');
        const rotXEl = document.getElementById('rotX'), rotYEl = document.getElementById('rotY'), rotZEl = document.getElementById('rotZ');
        const posXEl = document.getElementById('posX'), posYEl = document.getElementById('posY'), posZEl = document.getElementById('posZ');
        
        const scaleVal = document.getElementById('scaleVal');
        const rotXVal = document.getElementById('rotXVal'), rotYVal = document.getElementById('rotYVal'), rotZVal = document.getElementById('rotZVal');
        const posXVal = document.getElementById('posXVal'), posYVal = document.getElementById('posYVal'), posZVal = document.getElementById('posZVal');
        const codeOutput = document.getElementById('code-output');

        Promise.all(configs.map(cfg => {
            return new Promise(resolve => {
                loader.load(cfg.file, (gltf) => {
                    const model = gltf.scene;
                    model.traverse((child) => {
                        if (child.isMesh) child.material = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.6, metalness: 0.3 });
                    });
                    resolve(model);
                });
            });
        })).then(models => {
            loadedModels = models;
            displayModel(0);
        });

        // Kiszámolja és eltolja a burkolót (wrapper), hogy a hitbox kockák pontosan beüljenek a négyzethálókba
        function updateWrapperSnap() {
            const index = parseInt(selectEl.value);
            const cfg = configs[index];
            const isRotated = Math.abs(gameRotationY % Math.PI) > 0.1;
            
            let cx = 0.5; let cz = 0.5;
            if (isRotated) {
                cx = (cfg.length % 2 === 0) ? 0 : 0.5;
                cz = 0.5;
            } else {
                cx = 0.5;
                cz = (cfg.length % 2 === 0) ? 0 : 0.5;
            }
            mainWrapper.position.set(cx, 0, cz);
        }

        function displayModel(index) {
            gameRotationY = 0;
            mainWrapper.rotation.y = 0;
            clearShots();

            while(mainWrapper.children.length > 0){ mainWrapper.remove(mainWrapper.children[0]); }
            
            const cfg = configs[index];

            // ÚJ HITBOX VIZUALIZÁCIÓ: Külön 1x1-es kockákból építjük fel, így pontosan látszik a rács kitöltése!
            currentHitbox = new THREE.Group();
            for (let i = 0; i < cfg.length; i++) {
                const cellGeo = new THREE.BoxGeometry(0.95, 0.95, 0.95); // Picit kisebb mint 1, hogy látszódjon a padlórács
                const cellMesh = new THREE.Mesh(cellGeo, hitboxMaterial);
                const offset = - (cfg.length / 2) + 0.5 + i;
                cellMesh.position.set(0, 0.5, offset); // Középtől számított eltolás
                currentHitbox.add(cellMesh);
            }
            mainWrapper.add(currentHitbox);
            
            currentModelMesh = loadedModels[index];
            mainWrapper.add(currentModelMesh);
            
            scaleEl.value = cfg.scale;
            rotXEl.value = cfg.rotX; rotYEl.value = cfg.rotY; rotZEl.value = cfg.rotZ;
            posXEl.value = cfg.posX; posYEl.value = cfg.posY; posZEl.value = cfg.posZ;
            
            updateWrapperSnap();
            applyTransformations();
        }

        function applyTransformations() {
            if (!currentModelMesh) return;
            
            const index = parseInt(selectEl.value);
            const cfg = configs[index];
            
            cfg.scale = parseFloat(scaleEl.value);
            cfg.rotX = parseInt(rotXEl.value); cfg.rotY = parseInt(rotYEl.value); cfg.rotZ = parseInt(rotZEl.value);
            cfg.posX = parseFloat(posXEl.value); cfg.posY = parseFloat(posYEl.value); cfg.posZ = parseFloat(posZEl.value);

            scaleVal.innerText = cfg.scale.toFixed(2);
            rotXVal.innerText = cfg.rotX + '°'; rotYVal.innerText = cfg.rotY + '°'; rotZVal.innerText = cfg.rotZ + '°';
            posXVal.innerText = cfg.posX.toFixed(2); posYVal.innerText = cfg.posY.toFixed(2); posZVal.innerText = cfg.posZ.toFixed(2);

            currentModelMesh.scale.set(cfg.scale, cfg.scale, cfg.scale);
            currentModelMesh.rotation.set(
                THREE.MathUtils.degToRad(cfg.rotX),
                THREE.MathUtils.degToRad(cfg.rotY),
                THREE.MathUtils.degToRad(cfg.rotZ)
            );
            currentModelMesh.position.set(cfg.posX, cfg.posY, cfg.posZ);

            generateCode();
        }

        window.addEventListener('click', (event) => {
            if (event.target !== renderer.domElement) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, planeIntersect);

            const shotX = Math.floor(planeIntersect.x) + 0.5;
            const shotZ = Math.floor(planeIntersect.z) + 0.5;

            // FIZIKAI SUGÁR ELLENŐRZÉS: Fentről lefelé lőve eltalálja-e a hitbox kockákat?
            const testRay = new THREE.Raycaster(new THREE.Vector3(shotX, 10, shotZ), new THREE.Vector3(0, -1, 0));
            const intersects = testRay.intersectObject(currentHitbox, true);
            const isHit = intersects.length > 0;

            const markerGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const markerMat = new THREE.MeshBasicMaterial({ color: isHit ? 0xff0000 : 0x555555 });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.set(shotX, 0.4, shotZ);
            
            scene.add(marker);
            shotMarkers.push(marker);
        });

        document.getElementById('rotateBtn').addEventListener('click', () => {
            gameRotationY += Math.PI / 2;
            mainWrapper.rotation.y = gameRotationY;
            updateWrapperSnap();
        });

        function clearShots() {
            shotMarkers.forEach(m => scene.remove(m));
            shotMarkers = [];
        }
        document.getElementById('clearShotsBtn').addEventListener('click', clearShots);

        selectEl.addEventListener('change', (e) => displayModel(e.target.value));
        scaleEl.addEventListener('input', applyTransformations);
        rotXEl.addEventListener('input', applyTransformations); rotYEl.addEventListener('input', applyTransformations); rotZEl.addEventListener('input', applyTransformations);
        posXEl.addEventListener('input', applyTransformations); posYEl.addEventListener('input', applyTransformations); posZEl.addEventListener('input', applyTransformations);

        function generateCode() {
            let code = `const shipConfig = [\n`;
            configs.forEach((c, i) => {
                const isLast = i === configs.length - 1;
                let rx = c.rotX === 0 ? "0" : `Math.PI * (${c.rotX}/180)`;
                let ry = c.rotY === 0 ? "0" : `Math.PI * (${c.rotY}/180)`;
                let rz = c.rotZ === 0 ? "0" : `Math.PI * (${c.rotZ}/180)`;
                
                code += `    { file: '${c.file}', length: ${c.length}, scale: ${c.scale.toFixed(2)}, rotX: ${rx}, rotY: ${ry}, rotZ: ${rz}, posX: ${c.posX.toFixed(2)}, posY: ${c.posY.toFixed(2)}, posZ: ${c.posZ.toFixed(2)} }${isLast ? '' : ','}\n`;
            });
            code += `];`;
            codeOutput.innerText = code;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
